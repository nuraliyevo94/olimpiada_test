<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — Matematika Olimpiadasi</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="initKaTeX()"></script>
  <style>
    .question-pane { display: none; }
    .question-pane.active { display: block; }
  </style>
</head>
<body>
  <div class="floating-deco">🧮</div>
  <div class="floating-deco">📐</div>
  <div class="floating-deco">✏️</div>
  <div class="floating-deco">🔢</div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Savollar yuklanmoqda...</div>
  </div>

  <!-- Submit confirmation modal -->
  <div class="modal-overlay" id="submit-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">📤</div>
      <div class="modal-title">Testni yakunlash</div>
      <div class="modal-text" id="submit-modal-text">
        Javoblaringizni yuborishga ishonchingiz komilmi?
      </div>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeSubmitModal()">❌ Bekor qilish</button>
        <button class="btn btn-primary" onclick="doSubmit()">✅ Yuborish</button>
      </div>
    </div>
  </div>

  <!-- Time's up modal -->
  <div class="modal-overlay" id="timesup-modal" style="display:none;">
    <div class="modal-box">
      <div class="modal-icon">⏰</div>
      <div class="modal-title">Vaqt tugadi!</div>
      <div class="modal-text">Javoblaringiz avtomatik yuborilmoqda...</div>
    </div>
  </div>

  <div class="page-wrapper" id="main-content" style="display:none;">
    <!-- Sticky header with timer -->
    <div style="position:sticky; top:0; z-index:100; background:rgba(255,252,240,0.95); backdrop-filter:blur(12px); padding:12px 16px; margin:-24px -16px 24px; border-bottom:1.5px solid rgba(0,0,0,0.06);">
      <div class="container">
        <div class="test-header">
          <div class="test-progress-info">
            <div style="font-weight:800; font-size:1rem; color:#1A1A2E;">
              <span id="student-name-display"></span>
              <span style="background:rgba(2,136,209,0.1); color:#0288D1; border-radius:50px; padding:3px 10px; font-size:0.8rem; margin-left:8px;" id="sinf-display"></span>
            </div>
            <div style="font-size:0.85rem; color:#6B7280; font-weight:700;">
              Savol <span id="current-q-num">1</span>/30
            </div>
          </div>
          <div class="timer-box" id="timer-box">
            ⏱ <span id="timer-display">60:00</span>
          </div>
        </div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- Question navigation -->
      <div class="card" style="padding:20px 24px; margin-bottom:20px;">
        <div style="font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#6B7280; margin-bottom:12px;">
          Savollar — javob berilganlari ko'rsatilgan
        </div>
        <div class="question-nav" id="question-nav"></div>
      </div>

      <!-- Questions -->
      <div id="questions-container"></div>

      <!-- Navigation buttons -->
      <div class="test-nav-btns" style="margin-top:20px;">
        <button class="btn btn-outline" id="prev-btn" onclick="navigate(-1)" disabled>
          ← Oldingi
        </button>
        <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:center;">
          <button class="btn btn-sky" id="next-btn" onclick="navigate(1)">
            Keyingi →
          </button>
          <button class="btn btn-success" id="submit-btn" style="display:none;" onclick="openSubmitModal()">
            ✅ Yakunlash
          </button>
        </div>
      </div>

      <div style="text-align:center; margin-top:16px;">
        <button class="btn btn-outline" onclick="openSubmitModal()" style="font-size:0.88rem; padding:10px 20px;">
          📤 Hamma savolni ko'rmasdan yakunlash
        </button>
      </div>
    </div>

    <footer class="site-footer">
      Muallif: <span>Otabek Nuraliyev</span> · Matematika olimpiadasi testi · 2026
    </footer>
  </div>

  <script>
    // ─── Ma'lumotlarni yuklash ─────────────────────────────────────────────
    let testData = null;
    let allQuestions = [];
    let userAnswers = {};
    let currentIdx = 0;
    let timerInterval = null;
    let secondsLeft = 3600;
    let startTime = Date.now();
    let katexReady = false;
    let katexQueue = [];

    function initKaTeX() {
      katexReady = true;
      katexQueue.forEach(fn => fn());
      katexQueue = [];
    }

    function renderMath(el) {
      if (katexReady) {
        renderMathInElement(el, {
          delimiters: [
            {left:"\\[", right:"\\]", display:true},
            {left:"\\(", right:"\\)", display:false},
            {left:"$", right:"$", display:false}
          ],
          throwOnError: false
        });
      } else {
        katexQueue.push(() => renderMathInElement(el, {
          delimiters: [
            {left:"\\[", right:"\\]", display:true},
            {left:"\\(", right:"\\)", display:false},
            {left:"$", right:"$", display:false}
          ],
          throwOnError: false
        }));
      }
    }

    function formatOptionMath(text) {
      let t = text || '';
      t = t.replace(/\bfrac{/g, '\\frac{');
      if (t.includes('\\') || t.includes('^') || t.includes('_') || /^[0-9\s.,\-\+\*\/=()]+$/.test(t)) {
        try {
          return katex.renderToString(t, { displayMode: false, throwOnError: false });
        } catch(e) {
          return escapeHtml(t);
        }
      }
      return escapeHtml(t);
    }

    // ─── Init ──────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const raw = sessionStorage.getItem('testData');
      const studentRaw = sessionStorage.getItem('student');

      if (!raw || !studentRaw) {
        window.location.href = '/';
        return;
      }

      testData = JSON.parse(raw);
      const student = JSON.parse(studentRaw);
      
      document.getElementById('student-name-display').textContent = student.name;
      document.getElementById('sinf-display').textContent = student.sinf + '-sinf';

      // Savollarni birlashtirish
      const { easy, medium, hard } = testData.questions;
      allQuestions = [
        ...easy.map((q, i) => ({ ...q, _section: 'easy', _idx: i, _pos: i + 1, _points: 2 })),
        ...medium.map((q, i) => ({ ...q, _section: 'medium', _idx: i, _pos: i + 11, _points: 3 })),
        ...hard.map((q, i) => ({ ...q, _section: 'hard', _idx: i, _pos: i + 21, _points: 5, type: 'open' }))
      ];

      buildQuestions();
      buildNav();
      startTimer();

      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('main-content').style.display = 'flex';

      // Test tugash vaqtini ham tekshirish
      checkTestEndTime();
    });

    // ─── Test tugash vaqtini tekshirish ────────────────────────────────────
    function checkTestEndTime() {
      if (testData.testEndTime) {
        const endTime = new Date(testData.testEndTime);
        const startedAt = parseInt(sessionStorage.getItem('testStartTime') || Date.now());
        const remaining = Math.floor((endTime - new Date()) / 1000);
        if (remaining > 0 && remaining < secondsLeft) {
          secondsLeft = remaining;
        } else if (remaining <= 0) {
          forceSubmit();
        }
      }
    }

    // ─── Taymer ───────────────────────────────────────────────────────────
    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        secondsLeft--;
        updateTimerDisplay();

        // Test server vaqtini ham tekshirish (har 30 sekund)
        if (secondsLeft % 30 === 0) checkTestEndTime();

        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          forceSubmit();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const h = Math.floor(secondsLeft / 3600);
      const m = Math.floor((secondsLeft % 3600) / 60);
      const s = secondsLeft % 60;
      const display = h > 0
        ? `${pad(h)}:${pad(m)}:${pad(s)}`
        : `${pad(m)}:${pad(s)}`;
      document.getElementById('timer-display').textContent = display;

      const box = document.getElementById('timer-box');
      if (secondsLeft <= 300) { box.className = 'timer-box danger'; }
      else if (secondsLeft <= 600) { box.className = 'timer-box warning'; }
    }

    function pad(n) { return n.toString().padStart(2, '0'); }

    // ─── Savollar qurish ──────────────────────────────────────────────────
    function buildQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      allQuestions.forEach((q, idx) => {
        const pane = document.createElement('div');
        pane.className = `question-pane ${idx === 0 ? 'active' : ''} question-card ${q._section}`;
        pane.id = `qpane-${idx}`;

        const sectionLabel = { easy: '⭐ Oson • 2 ball', medium: '🔥 O\'rta • 3 ball', hard: '💎 Qiyin • 5 ball' }[q._section];

        let answerHtml = '';
        if (q.type === 'open') {
          answerHtml = `
            <input type="text" class="open-answer-input" id="open-input-${idx}"
              placeholder="Javobingizni shu yerga kiriting..."
              value="${userAnswers['hard_' + q._idx] || ''}"
              oninput="setOpenAnswer(${idx}, ${q._idx}, this.value)"
              autocomplete="off" inputmode="decimal">
            <div class="open-answer-hint">💡 Natural sonni kiriting (masalan: 27500)</div>
          `;
        } else {
          answerHtml = `<div class="options-grid">` +
            q.options.map(opt => `
              <button class="option-btn ${userAnswers[q._section + '_' + q._idx] === opt.letter ? 'selected' : ''}"
                id="opt-${idx}-${opt.letter}"
                onclick="selectOption(${idx}, '${q._section}', ${q._idx}, '${opt.letter}')">
                <span class="option-letter">${opt.letter}</span>
                <span class="option-text">${formatOptionMath(opt.text)}</span>
              </button>
            `).join('') +
          `</div>`;
        }

        pane.innerHTML = `
          <div class="question-number">Savol ${q._pos} / 30</div>
          <div class="question-score-badge">⭐ ${sectionLabel}</div>
          <div class="question-text" id="qtext-${idx}">${escapeHtml(q.text)}</div>
          ${answerHtml}
        `;
        container.appendChild(pane);

        // KaTeX render
        requestAnimationFrame(() => renderMath(pane));
      });
    }

    function escapeHtml(text) {
      return (text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Navigatsiya ──────────────────────────────────────────────────────
    function buildNav() {
      const nav = document.getElementById('question-nav');
      nav.innerHTML = '';

      const sections = [
        { label: '⭐ Oson (1–10)', count: 10 },
        { label: '🔥 O\'rta (11–20)', count: 10 },
        { label: '💎 Yopiq (21–30)', count: 10 }
      ];

      let qIdx = 0;
      sections.forEach((sec, si) => {
        if (si > 0) {
          const sep = document.createElement('div');
          sep.className = 'nav-section-label';
          sep.style.cssText = 'margin:4px 0 2px; font-size:0.72rem; color:#9CA3AF;';
          sep.textContent = sec.label;
          nav.appendChild(sep);
        } else {
          const lbl = document.createElement('div');
          lbl.className = 'nav-section-label';
          lbl.style.cssText = 'margin:0 0 2px; font-size:0.72rem; color:#9CA3AF;';
          lbl.textContent = sec.label;
          nav.appendChild(lbl);
        }

        for (let i = 0; i < sec.count; i++) {
          const btn = document.createElement('button');
          btn.className = `qnav-btn ${qIdx === 0 ? 'current' : ''}`;
          btn.id = `qnav-${qIdx}`;
          btn.textContent = qIdx + 1;
          const capturedIdx = qIdx;
          btn.onclick = () => goTo(capturedIdx);
          nav.appendChild(btn);
          qIdx++;
        }
      });
    }

    function updateNav() {
      allQuestions.forEach((q, idx) => {
        const btn = document.getElementById(`qnav-${idx}`);
        if (!btn) return;
        let answered = false;
        if (q.type === 'open') answered = !!(userAnswers['hard_' + q._idx] || '').trim();
        else answered = !!userAnswers[q._section + '_' + q._idx];

        btn.className = `qnav-btn${answered ? ' answered' : ''}${idx === currentIdx ? ' current' : ''}`;
      });

      // Progress bar
      const answered = Object.keys(userAnswers).filter(k => userAnswers[k] !== '' && userAnswers[k] !== undefined).length;
      document.getElementById('progress-bar').style.width = `${(answered / 30) * 100}%`;
      document.getElementById('current-q-num').textContent = currentIdx + 1;

      // Tugmalar
      document.getElementById('prev-btn').disabled = currentIdx === 0;
      const nextBtn = document.getElementById('next-btn');
      const submitBtn = document.getElementById('submit-btn');
      if (currentIdx === allQuestions.length - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'inline-flex';
      } else {
        nextBtn.style.display = 'inline-flex';
        submitBtn.style.display = 'none';
      }
    }

    function goTo(idx) {
      document.getElementById(`qpane-${currentIdx}`)?.classList.remove('active');
      currentIdx = idx;
      document.getElementById(`qpane-${currentIdx}`)?.classList.add('active');
      updateNav();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function navigate(dir) { goTo(Math.max(0, Math.min(allQuestions.length - 1, currentIdx + dir))); }

    // ─── Javob berish ──────────────────────────────────────────────────────
    function selectOption(qIdx, section, qArrIdx, letter) {
      const key = `${section}_${qArrIdx}`;
      userAnswers[key] = letter;

      // UI yangilash
      const q = allQuestions[qIdx];
      q.options.forEach(opt => {
        document.getElementById(`opt-${qIdx}-${opt.letter}`)?.classList.remove('selected');
      });
      document.getElementById(`opt-${qIdx}-${letter}`)?.classList.add('selected');
      updateNav();
    }

    function setOpenAnswer(qIdx, qArrIdx, value) {
      userAnswers[`hard_${qArrIdx}`] = value;
      updateNav();
    }

    // ─── Yuborish ─────────────────────────────────────────────────────────
    function openSubmitModal() {
      const answered = allQuestions.filter((q, i) => {
        if (q.type === 'open') return !!(userAnswers['hard_' + q._idx] || '').trim();
        return !!userAnswers[q._section + '_' + q._idx];
      }).length;
      const unanswered = 30 - answered;
      const modalText = document.getElementById('submit-modal-text');
      if (unanswered > 0) {
        modalText.innerHTML = `<strong>${answered}</strong> ta savolga javob berdingiz.<br><span style="color:#DC2626;"><strong>${unanswered}</strong> ta savol javobsiz qoldi.</span><br><br>Yakunlashga ishonchingiz komilmi?`;
      } else {
        modalText.innerHTML = `Barcha <strong>30</strong> ta savolga javob berdingiz! 🎉<br><br>Yakunlashga ishonchingiz komilmi?`;
      }
      document.getElementById('submit-modal').style.display = 'flex';
    }

    function closeSubmitModal() {
      document.getElementById('submit-modal').style.display = 'none';
    }

    async function doSubmit() {
      closeSubmitModal();
      clearInterval(timerInterval);
      const timeSpent = 7200 - secondsLeft;

      document.getElementById('loading-overlay').style.display = 'flex';
      document.getElementById('loading-overlay').querySelector('.loading-text').textContent = 'Javoblar yuborilmoqda...';

      const student = JSON.parse(sessionStorage.getItem('student'));

      try {
        const resp = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: testData.sessionId,
            studentId: student.id,
            name: student.name,
            sinf: student.sinf,
            answers: userAnswers,
            timeSpent: timeSpent
          })
        });
        const data = await resp.json();
        if (data.success) {
          sessionStorage.setItem('testResult', JSON.stringify(data.result));
          if (data.newBadges && data.newBadges.length > 0) {
            sessionStorage.setItem('newBadges', JSON.stringify(data.newBadges));
          }
          sessionStorage.removeItem('testData');
          window.location.href = '/result';
        } else {
          alert(data.error || 'Xatolik yuz berdi');
          document.getElementById('loading-overlay').style.display = 'none';
        }
      } catch(e) {
        alert('Server bilan bog\'lanib bo\'lmadi. Sahifani yangilamang!');
        document.getElementById('loading-overlay').style.display = 'none';
      }
    }

    function forceSubmit() {
      document.getElementById('timesup-modal').style.display = 'flex';
      setTimeout(() => doSubmit(), 2000);
    }
  </script>
</body>
</html>
